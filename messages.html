
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - QuickWork</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="header-container">
              <div class="logo">QuickWork</div>
              <label class="switch">
                <input type="checkbox" id="theme-toggle">
                <span class="slider round"></span>
              </label>
            </div>
          </header>
          
        
        <div class="container">
            <h1>Messages</h1>
            <div class="messages-list">
                <div class="empty-state">
                    <i data-lucide="message-square" class="empty-state-icon"></i>
                    <h3>No Messages Yet</h3>
                    <p>Your messages will appear here</p>
                </div>
            </div>
        </div>

        <nav class="navbar">
            <div class="container">
                <ul>
                    <li>
                        <a href="home.html" class="nav-link">
                            <i data-lucide="home" class="icon"></i>
                            <span class="label">Home</span>
                        </a>
                    </li>
                    <li>
                        <a href="myjobs.html" class="nav-link">
                            <i data-lucide="briefcase" class="icon"></i>
                            <span class="label">My Jobs</span>
                        </a>
                    </li>
                    <li>
                        <a href="messages.html" class="nav-link active">
                            <i data-lucide="message-square" class="icon"></i>
                            <span class="label">Messages</span>
                        </a>
                    </li>
                    <li>
                        <a href="notifications.html" class="nav-link">
                            <i data-lucide="bell" class="icon"></i>
                            <span class="label">Alerts</span>
                        </a>
                    </li>
                    <li>
                        <a href="settings.html" class="nav-link">
                            <i data-lucide="settings" class="icon"></i>
                            <span class="label">Settings</span>
                        </a>
                    </li>
                </ul>
            </div>
        </nav>
    </div>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
    <script src="js/data.js"></script>
    <script>
        // Initialize icons
        lucide.createIcons();
    </script>
    <script>
        // Load mode on page load
        document.addEventListener('DOMContentLoaded', () => {
          const toggle = document.getElementById('theme-toggle');
          const savedMode = localStorage.getItem('theme') || 'light';
          
          if (savedMode === 'dark') {
            document.body.classList.add('dark-mode');
            toggle.checked = true;
          } else {
            document.body.classList.add('light-mode');
          }
      
          toggle.addEventListener('change', () => {
            if (toggle.checked) {
              document.body.classList.remove('light-mode');
              document.body.classList.add('dark-mode');
              localStorage.setItem('theme', 'dark');
            } else {
              document.body.classList.remove('dark-mode');
              document.body.classList.add('light-mode');
              localStorage.setItem('theme', 'light');
            }
          });
        });
      </script>
      
</body>
</html>
