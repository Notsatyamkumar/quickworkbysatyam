<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings - QuickWork</title>
  <link rel="stylesheet" href="styles/main.css" />
  
  <style>
    /* Dark mode styles */
    body.dark-mode {
      background-color: #121212;
      color: #ffffff;
    }

    body.dark-mode .header,
    body.dark-mode .navbar,
    body.dark-mode .container {
      background-color: #1e1e1e;
    }

    body.dark-mode .btn-outline {
      border-color: #ffffff;
      color: #ffffff;
    }

    /* Toggle Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 34px;
      margin-bottom: 10px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0;
      right: 0; bottom: 0;
      background-color: #ccc;
      transition: 0.4s;
      border-radius: 34px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 26px; width: 26px;
      left: 4px; bottom: 4px;
      background-color: white;
      transition: 0.4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #2196F3;
    }

    input:checked + .slider:before {
      transform: translateX(26px);
    }

    /* Centering content */
    .settings-group {
      text-align: center;
      margin-top: 50px;
    }

    .dark-toggle-text {
      margin-bottom: 10px;
      display: block;
      font-size: 1.1rem;
      font-weight: 500;
    }
  </style>
</head>

<body>
    <header class="header">
        <div class="header-container">
          <div class="logo">QuickWork</div>
          <label class="switch">
            <input type="checkbox" id="theme-toggle">
            <span class="slider round"></span>
          </label>
        </div>
      </header>
      

    <div class="container">
      <h1 style="text-align: center;">Settings</h1>
      <div class="settings-list">
        <div class="settings-group">
            <!-- My Profile Section -->
            <div class="section">
                <h1 class="section-title">My Profile</h1>
                <div class="profile-box">
                <div class="profile-info">
                    <h3 id="profile-name">Your Name</h3> <br>
                    <p id="profile-phone">Phone Number</p><br>
                    <p id="profile-email">Email Address</p><br>
                </div>
                </div>
            </div>
            
        
          <button class="btn btn-outline" onclick="Accountsettings()" c>Account Settings</button>
          <br><br><br><br>
          <button class="btn btn-outline" onclick="logoutUser()">Logout</button>
        </div>
      </div>
    </div>

    <nav class="navbar">
      <div class="container">
        <ul>
          <li>
            <a href="home.html" class="nav-link">
              <i data-lucide="home" class="icon"></i>
              <span class="label">Home</span>
            </a>
          </li>
          <li>
            <a href="myjobs.html" class="nav-link">
              <i data-lucide="briefcase" class="icon"></i>
              <span class="label">My Jobs</span>
            </a>
          </li>
          <li>
            <a href="messages.html" class="nav-link">
              <i data-lucide="message-square" class="icon"></i>
              <span class="label">Messages</span>
            </a>
          </li>
          <li>
            <a href="notifications.html" class="nav-link">
              <i data-lucide="bell" class="icon"></i>
              <span class="label">Alerts</span>
            </a>
          </li>
          <li>
            <a href="settings.html" class="nav-link active">
              <i data-lucide="settings" class="icon"></i>
              <span class="label">Settings</span>
            </a>
          </li>
        </ul>
      </div>
    </nav>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
  <script src="js/settings.js"></script>
  <script>
    // 🌟 Icon loader
    lucide.createIcons();

    // 🌙 Toggle Dark Mode
    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');

      updateDarkModeText(isDark);
    }

    // 🧠 Load preference from localStorage
    window.onload = () => {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.body.classList.add('dark-mode');
        document.getElementById('darkModeToggle').checked = true;
        updateDarkModeText(true);
      } else {
        updateDarkModeText(false);
      }
    };

    function updateDarkModeText(isDark) {
      const textElement = document.getElementById('darkModeText');
      if (isDark) {
        textElement.textContent = 'Switch to Light Mode';
      } else {
        textElement.textContent = 'Switch to Dark Mode';
      }
    }
  </script>
  <script>
    // Load mode on page load
    document.addEventListener('DOMContentLoaded', () => {
      const toggle = document.getElementById('theme-toggle');
      const savedMode = localStorage.getItem('theme') || 'light';
      
      if (savedMode === 'dark') {
        document.body.classList.add('dark-mode');
        toggle.checked = true;
      } else {
        document.body.classList.add('light-mode');
      }
  
      toggle.addEventListener('change', () => {
        if (toggle.checked) {
          document.body.classList.remove('light-mode');
          document.body.classList.add('dark-mode');
          localStorage.setItem('theme', 'dark');
        } else {
          document.body.classList.remove('dark-mode');
          document.body.classList.add('light-mode');
          localStorage.setItem('theme', 'light');
        }
      });
    });

    function logoutUser(){
        window.location.href = "index.html";
    }
  </script>
  
</body>
</html>
